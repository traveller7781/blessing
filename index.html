<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>母亲节祝福</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Dancing+Script:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
  }

  body {
    font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
    background: linear-gradient(160deg, #fef0e6 0%, #fde2d4 25%, #fce4ec 55%, #f3e5f5 100%);
    background-size: 400% 400%;
    animation: bgShift 20s ease infinite;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    cursor: default;
  }

  @keyframes bgShift {
    0%, 100% { background-position: 0% 50%; }
    25% { background-position: 100% 0%; }
    50% { background-position: 100% 100%; }
    75% { background-position: 0% 100%; }
  }

  canvas#particleCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .main-container {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: max(env(safe-area-inset-top, 16px), 16px) max(env(safe-area-inset-right, 16px), 16px) max(env(safe-area-inset-bottom, 16px), 16px) max(env(safe-area-inset-left, 16px), 16px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ---------- Background Decorations ---------- */
  .bg-decor {
    position: fixed;
    pointer-events: none;
    z-index: 2;
    font-size: 40px;
    opacity: 0.18;
    animation: decorFloat 6s ease-in-out infinite;
  }

  .bg-decor:nth-child(1) { top: 8%; left: 5%; font-size: 50px; animation-delay: 0s; }
  .bg-decor:nth-child(2) { top: 12%; right: 6%; font-size: 36px; animation-delay: 1s; }
  .bg-decor:nth-child(3) { bottom: 18%; left: 8%; font-size: 42px; animation-delay: 2s; }
  .bg-decor:nth-child(4) { bottom: 12%; right: 5%; font-size: 48px; animation-delay: 3s; }
  .bg-decor:nth-child(5) { top: 45%; left: 3%; font-size: 30px; animation-delay: 1.5s; }
  .bg-decor:nth-child(6) { top: 40%; right: 3%; font-size: 34px; animation-delay: 2.5s; }
  .bg-decor:nth-child(7) { top: 5%; left: 45%; font-size: 28px; animation-delay: 0.8s; }
  .bg-decor:nth-child(8) { bottom: 8%; left: 50%; font-size: 32px; animation-delay: 3.5s; }

  @keyframes decorFloat {
    0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
    25%  { transform: translateY(-12px) rotate(5deg) scale(1.1); }
    50%  { transform: translateY(-6px) rotate(-3deg) scale(0.95); }
    75%  { transform: translateY(-16px) rotate(4deg) scale(1.05); }
  }

  /* ---------- Card ---------- */
  .card {
    position: relative;
    background: linear-gradient(160deg, rgba(255,248,240,0.9) 0%, rgba(255,240,232,0.9) 50%, rgba(252,235,228,0.9) 100%);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 24px;
    border: 1px solid rgba(233,180,160,0.25);
    padding: 48px 40px 40px;
    max-width: 520px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(200,120,100,0.16), 0 2px 8px rgba(180,100,80,0.06), inset 0 1px 0 rgba(255,255,255,0.5);
    text-align: center;
    animation: cardEnter 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    transform: translateY(30px);
    opacity: 0;
    transition: box-shadow 0.6s;
  }

  .card:hover {
    box-shadow: 0 14px 44px rgba(200,120,100,0.24), 0 4px 12px rgba(180,100,80,0.1), inset 0 1px 0 rgba(255,255,255,0.5);
  }

  .card::before,
  .card::after {
    content: '🌸';
    position: absolute;
    font-size: 18px;
    opacity: 0.3;
    pointer-events: none;
    animation: cornerFloat 4s ease-in-out infinite;
  }
  .card::before { top: 8px; left: 12px; }
  .card::after  { bottom: 8px; right: 12px; animation-delay: 2s; }

  @keyframes cornerFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.25; }
    50% { transform: translateY(-4px) rotate(8deg); opacity: 0.4; }
  }

  @keyframes cardEnter {
    to { transform: translateY(0); opacity: 1; }
  }

  .card .icon-row {
    font-size: 48px;
    margin-bottom: 8px;
    animation: iconBounce 2s ease-in-out infinite;
  }

  @keyframes iconBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .card h1 {
    font-size: clamp(24px, 5vw, 36px);
    color: #c2185b;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .card .subtitle {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(18px, 3.5vw, 24px);
    color: #e91e63;
    opacity: 0.75;
    margin-bottom: 18px;
  }

  .card .divider {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #f48fb1, #ce93d8, #f48fb1);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .card .blessing {
    font-size: clamp(16px, 3vw, 20px);
    color: #5d4037;
    line-height: 1.8;
    padding: 8px 12px;
    word-break: break-word;
  }

  .card .date {
    font-size: 14px;
    color: #8d6e63;
    margin-top: 18px;
    letter-spacing: 1px;
  }

  .card .signature {
    font-size: 15px;
    color: #a1887f;
    margin-top: 6px;
    font-style: italic;
  }

  /* ---------- Flower Area ---------- */
  .flower-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    animation: cardEnter 1.2s 0.3s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  }

  .flower-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: transform 0.3s;
    padding: 6px;
    min-width: 56px;
  }

  .flower-wrapper:hover { transform: translateY(-4px); }
  .flower-wrapper:active { transform: scale(0.9); }

  .flower-head {
    font-size: 42px;
    line-height: 1;
    filter: grayscale(0.7) brightness(0.7);
    transform: scale(0.5);
    transition: all 0.55s cubic-bezier(0.68, -0.3, 0.265, 1.55);
    position: relative;
    z-index: 2;
  }

  .flower-glow {
    position: absolute;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    top: 0;
    left: 50%;
    transform: translate(-50%, 0) scale(0);
    opacity: 0;
    transition: all 0.6s;
    pointer-events: none;
  }

  .flower-wrapper:nth-child(1) .flower-glow { background: radial-gradient(circle, rgba(244,143,177,0.4) 0%, transparent 70%); }
  .flower-wrapper:nth-child(2) .flower-glow { background: radial-gradient(circle, rgba(233,30,99,0.4) 0%, transparent 70%); }
  .flower-wrapper:nth-child(3) .flower-glow { background: radial-gradient(circle, rgba(206,147,216,0.4) 0%, transparent 70%); }
  .flower-wrapper:nth-child(4) .flower-glow { background: radial-gradient(circle, rgba(255,171,145,0.4) 0%, transparent 70%); }
  .flower-wrapper:nth-child(5) .flower-glow { background: radial-gradient(circle, rgba(239,154,154,0.4) 0%, transparent 70%); }

  .flower-wrapper.lit .flower-head {
    filter: none;
    transform: scale(1);
  }

  .flower-wrapper.lit .flower-glow {
    transform: translate(-50%, 0) scale(1);
    opacity: 1;
  }

  .flower-label {
    font-size: 13px;
    color: #8d6e63;
    opacity: 0;
    transform: translateY(4px);
    transition: all 0.5s;
    letter-spacing: 1px;
  }

  .flower-wrapper.lit .flower-label {
    opacity: 1;
    transform: translateY(0);
  }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed;
    top: calc(env(safe-area-inset-top, 20px) + 10px);
    left: 50%;
    transform: translateX(-50%) translateY(-120px);
    background: linear-gradient(160deg, rgba(255,248,240,0.94) 0%, rgba(255,238,230,0.94) 100%);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(233,180,160,0.2);
    color: #ad1457;
    padding: 12px 24px;
    border-radius: 50px;
    font-family: inherit;
    font-size: 14px;
    z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  .toast.big {
    font-size: 20px;
    padding: 18px 32px;
    letter-spacing: 2px;
    white-space: nowrap;
    max-width: 95vw;
    overflow: hidden;
    text-overflow: ellipsis;
    animation: toastGlow 2s ease-in-out infinite;
    background: linear-gradient(90deg, #ad1457, #e91e63, #c2185b, #e91e63, #ad1457);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
  }

  @keyframes toastGlow {
    0%, 100% { background-position: 0% 50%; filter: drop-shadow(0 0 6px rgba(233,30,99,0.3)); }
    50% { background-position: 100% 50%; filter: drop-shadow(0 0 14px rgba(233,30,99,0.5)); }
  }

  /* ---------- Hint ---------- */
  .hint {
    font-size: 16px;
    color: #a1887f;
    letter-spacing: 1px;
    line-height: 1.7;
    animation: cardEnter 1.2s 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) both, hintPulse 3s 2s ease-in-out infinite;
    text-align: center;
    max-width: 90%;
  }

  @keyframes hintPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ---------- Responsive ---------- */
  @media (max-width: 600px) {
    .main-container { gap: 10px; }
    .card { padding: 24px 18px 20px; border-radius: 20px; }
    .card h1 { font-size: 26px; letter-spacing: 1px; }
    .card .subtitle { font-size: 18px; }
    .card .blessing { font-size: 15px; }
    .card .icon-row { font-size: 38px; }
    .flower-row { gap: 6px; }
    .flower-head { font-size: 34px; }
    .flower-wrapper { padding: 4px; min-width: 48px; }
    .hint { font-size: 13px; max-width: 95%; }
    .bg-decor { font-size: 28px !important; opacity: 0.12; }
    .toast.big { font-size: 15px; padding: 12px 20px; letter-spacing: 1px; background-size: 300% 100%; }
  }

  @media (max-width: 380px) {
    .main-container { gap: 8px; }
    .card { padding: 18px 12px 16px; border-radius: 16px; }
    .card h1 { font-size: 22px; }
    .card .subtitle { font-size: 16px; }
    .card .blessing { font-size: 14px; }
    .card .icon-row { font-size: 32px; }
    .card .divider { margin-bottom: 14px; }
    .card .date { font-size: 12px; margin-top: 12px; }
    .card .signature { font-size: 13px; }
    .flower-head { font-size: 28px; }
    .flower-row { gap: 2px; }
    .flower-wrapper { padding: 2px; min-width: 42px; }
    .flower-label { font-size: 10px; }
    .hint { font-size: 12px; }
    .bg-decor { font-size: 22px !important; opacity: 0.1; }
    .toast.big { font-size: 13px; padding: 8px 14px; letter-spacing: 0; background-size: 300% 100%; }
    .toast { font-size: 12px; padding: 10px 16px; }
  }
</style>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<span class="bg-decor">🌸</span>
<span class="bg-decor">🌺</span>
<span class="bg-decor">🌷</span>
<span class="bg-decor">🏵️</span>
<span class="bg-decor">💮</span>
<span class="bg-decor">🌼</span>
<span class="bg-decor">✨</span>
<span class="bg-decor">💖</span>

<div class="main-container">
  <div class="card">
    <div class="icon-row">🌸</div>
    <h1>老妈，母亲节快乐</h1>
    <p class="subtitle">Happy Mother's Day</p>
    <div class="divider"></div>
    <div class="blessing">愿时光慢一点，爱你多一点</div>
    <p class="date">2026年5月10日 · 母亲节</p>
    <p class="signature">—— 永远爱你的孩子</p>
  </div>

  <div class="flower-row" id="flowerRow">
    <div class="flower-wrapper" data-label="健康">
      <div style="position:relative">
        <div class="flower-glow"></div>
        <div class="flower-head">🌸</div>
      </div>
      <span class="flower-label">健康</span>
    </div>
    <div class="flower-wrapper" data-label="幸福">
      <div style="position:relative">
        <div class="flower-glow"></div>
        <div class="flower-head">🌺</div>
      </div>
      <span class="flower-label">幸福</span>
    </div>
    <div class="flower-wrapper" data-label="平安">
      <div style="position:relative">
        <div class="flower-glow"></div>
        <div class="flower-head">🌷</div>
      </div>
      <span class="flower-label">平安</span>
    </div>
    <div class="flower-wrapper" data-label="快乐">
      <div style="position:relative">
        <div class="flower-glow"></div>
        <div class="flower-head">🏵️</div>
      </div>
      <span class="flower-label">快乐</span>
    </div>
    <div class="flower-wrapper" data-label="美丽">
      <div style="position:relative">
        <div class="flower-glow"></div>
        <div class="flower-head">💮</div>
      </div>
      <span class="flower-label">美丽</span>
    </div>
  </div>

  <p class="hint">🌸 老妈，点一下花朵让它绽放吧<br>💖 点击空白处放飞心愿</p>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');

  let W, H;
  let mouseX = -999, mouseY = -999;
  let isMobile = false;

  // ---------- Particle arrays (must be declared before resize()) ----------
  let bgParticles = [];
  let MAX_BG = 30;
  let fallingPetals = [];
  let MAX_FALLING = 50;

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    isMobile = W < 600;

    if (isMobile) {
      MAX_BG = 18;
      MAX_FALLING = 28;
    } else {
      MAX_BG = 30;
      MAX_FALLING = 50;
    }

    while (bgParticles.length > MAX_BG) bgParticles.pop();
    while (fallingPetals.length > MAX_FALLING) fallingPetals.pop();
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- Color palette ----------
  function petalColor() {
    const c = [
      '#ffb3ba','#ffc3a0','#ffdfba','#ff9a9e','#fecfef',
      '#ffd1dc','#ffabab','#ffcccb','#f7a8b8','#ffb7c5',
      '#f8bbd0','#f48fb1','#ff80ab','#f06292','#ec407a'
    ];
    return c[Math.floor(Math.random() * c.length)];
  }

  function heartColor() {
    const c = ['#ff4081','#f48fb1','#ff80ab','#ff5252','#e91e63','#f06292','#ec407a'];
    return c[Math.floor(Math.random() * c.length)];
  }

  // ---------- Background ambient particles ----------

  function createBgParticle(x, y) {
    const angle = Math.random() * Math.PI * 2;
    return {
      x: x ?? Math.random() * W,
      y: y ?? Math.random() * H,
      heart: Math.random() < 0.4,
      size: 5 + Math.random() * 8,
      vx: Math.cos(angle) * 0.2,
      vy: -0.2 - Math.random() * 0.7,
      color: Math.random() < 0.4 ? heartColor() : petalColor(),
      opacity: 0.35 + Math.random() * 0.4,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.015,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.01 + Math.random() * 0.03,
      wobbleAmp: 0.3 + Math.random() * 0.6,
      life: 1,
      decay: 0.0006 + Math.random() * 0.0015
    };
  }

  // ---------- Falling petals (main visual effect) ----------

  function createFallingPetal(x, y) {
    const roll = Math.random();
    return {
      x: x ?? Math.random() * W,
      y: y ?? -(20 + Math.random() * H * 0.8),
      size: 10 + Math.random() * 18,
      vy: 0.4 + Math.random() * 1.4,
      vx: 0,
      swaySpeed: 0.008 + Math.random() * 0.025,
      swayAmp: 0.3 + Math.random() * 1.2,
      swayPhase: Math.random() * Math.PI * 2,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.03,
      color: petalColor(),
      opacity: 0.55 + Math.random() * 0.45,
      scaleX: 0.85 + Math.random() * 0.3,
      scaleY: 0.85 + Math.random() * 0.3,
      sparkle: roll < 0.18 // ~18% sparkles mixed in
    };
  }

  // Initialize
  for (let i = 0; i < MAX_BG; i++) bgParticles.push(createBgParticle());
  for (let i = 0; i < MAX_FALLING; i++) fallingPetals.push(createFallingPetal());

  // ---------- Drawing ----------
  function drawHeart(ctx, x, y, size) {
    const s = size * 0.55;
    ctx.beginPath();
    ctx.arc(x - s * 0.5, y - s * 0.2, s * 0.5, Math.PI, 0, false);
    ctx.arc(x + s * 0.5, y - s * 0.2, s * 0.5, Math.PI, 0, false);
    ctx.lineTo(x, y + s * 0.7);
    ctx.closePath();
    ctx.fill();
  }

  // Teardrop petal shape
  function drawPetal(ctx, x, y, size, rotation, sx, sy) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    ctx.scale(sx || 1, sy || 1);
    const hw = size * 0.28;
    const hh = size * 0.5;
    ctx.beginPath();
    ctx.moveTo(0, -hh);
    ctx.bezierCurveTo(hw, -hh * 0.6, hw, hh * 0.2, 0, hh);
    ctx.bezierCurveTo(-hw, hh * 0.2, -hw, -hh * 0.6, 0, -hh);
    ctx.fill();
    ctx.restore();
  }

  // 4-pointed sparkle / star
  function drawSparkle(ctx, x, y, size) {
    const s = size * 0.45;
    ctx.beginPath();
    ctx.moveTo(x, y - s);
    ctx.quadraticCurveTo(x + s * 0.15, y - s * 0.15, x + s * 0.35, y - s * 0.12);
    ctx.quadraticCurveTo(x + s * 0.2, y + s * 0.05, x + s, y);
    ctx.quadraticCurveTo(x + s * 0.2, y + s * 0.08, x + s * 0.35, y + s * 0.12);
    ctx.quadraticCurveTo(x + s * 0.15, y + s * 0.15, x, y + s);
    ctx.quadraticCurveTo(x - s * 0.15, y + s * 0.15, x - s * 0.35, y + s * 0.12);
    ctx.quadraticCurveTo(x - s * 0.2, y + s * 0.08, x - s, y);
    ctx.quadraticCurveTo(x - s * 0.2, y + s * 0.05, x - s * 0.35, y - s * 0.12);
    ctx.quadraticCurveTo(x - s * 0.15, y - s * 0.15, x, y - s);
    ctx.closePath();
    ctx.fill();
  }

  let frameCount = 0;

  function draw() {
    ctx.clearRect(0, 0, W, H);
    frameCount++;

    // ---- Background particles ----
    for (let i = bgParticles.length - 1; i >= 0; i--) {
      const p = bgParticles[i];

      const dx = p.x - mouseX;
      const dy = p.y - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120 && dist > 0) {
        const force = (120 - dist) / 120 * 0.04;
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;
      }

      p.wobble += p.wobbleSpeed;
      p.vx += Math.cos(p.wobble) * p.wobbleAmp * 0.005;
      p.vx *= 0.9995;
      p.vy *= 0.9995;
      p.x += p.vx;
      p.y += p.vy;
      p.rotation += p.rotSpeed;
      p.life -= p.decay;
      p.vy -= 0.003;

      if (p.y < -40) { p.y = H + 40; p.x = Math.random() * W; }
      if (p.y > H + 40) { p.y = -40; p.x = Math.random() * W; }
      if (p.x < -40) p.x = W + 40;
      if (p.x > W + 40) p.x = -40;

      if (p.life <= 0) { bgParticles.splice(i, 1); continue; }

      ctx.globalAlpha = p.opacity * p.life;
      ctx.fillStyle = p.color;
      if (p.heart) {
        drawHeart(ctx, p.x, p.y, p.size);
      } else {
        drawPetal(ctx, p.x, p.y, p.size * 0.7, p.rotation, 1, 1);
      }
    }

    // Replenish bg particles
    while (bgParticles.length < MAX_BG) {
      bgParticles.push(createBgParticle(Math.random() * W, H + 20));
    }
    // Soft cap: give burst hearts room to live before decaying naturally
    while (bgParticles.length > MAX_BG * 3) bgParticles.pop();

    // ---- Falling petals ----
    for (let i = fallingPetals.length - 1; i >= 0; i--) {
      const p = fallingPetals[i];

      // Sway: horizontal sine wave
      p.swayPhase += p.swaySpeed;
      p.vx = Math.sin(p.swayPhase) * p.swayAmp;

      // Mouse interaction — gentle push away
      const dx = p.x - mouseX;
      const dy = p.y - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 150 && dist > 0) {
        const force = (150 - dist) / 150 * 0.06;
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force * 0.3;
      }

      p.x += p.vx;
      p.y += p.vy;
      p.rotation += p.rotSpeed;

      // Respawn at top when reaching bottom
      if (p.y > H + 60) {
        p.y = -(20 + Math.random() * 40);
        p.x = Math.random() * W;
        p.swayPhase = Math.random() * Math.PI * 2;
        p.vy = 0.4 + Math.random() * 1.4;
        p.size = 10 + Math.random() * 18;
        p.color = petalColor();
        p.opacity = 0.55 + Math.random() * 0.45;
        p.sparkle = Math.random() < 0.18;
      }

      // Wrap horizontally
      if (p.x < -60) p.x = W + 60;
      if (p.x > W + 60) p.x = -60;

      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      if (p.sparkle) {
        drawSparkle(ctx, p.x, p.y, p.size);
        // Sparkle glow
        ctx.globalAlpha = p.opacity * 0.2;
        drawSparkle(ctx, p.x, p.y, p.size * 1.5);
        ctx.globalAlpha = p.opacity;
      } else {
        drawPetal(ctx, p.x, p.y, p.size, p.rotation, p.scaleX, p.scaleY);
        if (p.size > 18) {
          ctx.globalAlpha = p.opacity * 0.15;
          ctx.fillStyle = p.color;
          drawPetal(ctx, p.x + 2, p.y + 3, p.size * 0.85, p.rotation, p.scaleX, p.scaleY);
          ctx.globalAlpha = p.opacity;
        }
      }
    }

    ctx.globalAlpha = 1;

    // Spawn new falling petals periodically
    if (fallingPetals.length < MAX_FALLING && frameCount % 6 === 0) {
      fallingPetals.push(createFallingPetal(Math.random() * W, -(20 + Math.random() * 30)));
    }

    requestAnimationFrame(draw);
  }

  // ---------- Mouse ----------
  document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  document.addEventListener('touchmove', function(e) {
    if (e.touches.length > 0) {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    }
  }, { passive: true });

  // Click to spawn hearts + petals
  function spawnBurst(x, y, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.2 + Math.random() * 2.5;
      const isHeart = Math.random() < 0.6;
      bgParticles.push({
        x: x, y: y,
        heart: isHeart,
        size: 8 + Math.random() * 14,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1.5,
        color: isHeart ? heartColor() : petalColor(),
        opacity: 0.75 + Math.random() * 0.2,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.06,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.02 + Math.random() * 0.05,
        wobbleAmp: 0.4 + Math.random() * 0.6,
        life: 1,
        decay: 0.005 + Math.random() * 0.008
      });
    }
  }

  // Click empty area to spawn hearts
  document.addEventListener('click', function(e) {
    if (e.target.closest('.flower-wrapper')) return;
    spawnBurst(e.clientX, e.clientY, 10);
  });

  document.addEventListener('touchend', function(e) {
    if (e.target.closest('.flower-wrapper')) return;
    const touch = e.changedTouches[0];
    if (touch) {
      spawnBurst(touch.clientX, touch.clientY, 14);
    }
  });

  // ---------- Flowers ----------
  const flowerWrappers = document.querySelectorAll('.flower-wrapper');
  let bloomCount = 0;

  flowerWrappers.forEach(function(wrapper) {
    wrapper.addEventListener('click', function(e) {
      e.stopPropagation();
      if (wrapper.classList.contains('lit')) return; // already bloomed, ignore
      wrapper.classList.add('lit');
      bloomCount++;

      const rect = wrapper.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top;
      spawnBurst(cx, cy, 10);

      if (bloomCount === 5) {
        showToast('✨ 花开五朵，爱你万千 ✨', true);
        setTimeout(function() {
          spawnBurst(window.innerWidth / 2, window.innerHeight / 2, 22);
        }, 300);
      }
    });
  });

  // ---------- Toast ----------
  const toast = document.getElementById('toast');
  let toastTimer;

  function showToast(msg, persistent) {
    if (persistent) {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.classList.add('show', 'big');
    } else {
      clearTimeout(toastTimer);
      toast.classList.remove('big');
      toast.textContent = msg;
      toast.classList.add('show');
      toastTimer = setTimeout(function() {
        toast.classList.remove('show');
      }, 2500);
    }
  }

  // ---------- Background Music ----------
  let musicCtx = null;
  let musicPlaying = false;
  let musicStep = 0;

  // Light cheerful melody (C major pentatonic, music-box style)
  const melodyNotes = [
    523, 659, 784, 659, 523, 587, 659, 523,
    440, 523, 587, 659, 784, 880, 784, 659,
    523, 659, 784, 1047, 880, 784, 659, 587,
    523, 587, 659, 523, 440, 523, 659, 523,
  ];
  const melodyDurations = [
    0.25, 0.25, 0.35, 0.2, 0.2, 0.2, 0.4, 0.3,
    0.2, 0.2, 0.2, 0.25, 0.25, 0.35, 0.2, 0.3,
    0.25, 0.25, 0.4, 0.5, 0.2, 0.2, 0.3, 0.3,
    0.2, 0.2, 0.35, 0.2, 0.2, 0.25, 0.4, 0.4,
  ];

  function playNote(freq, duration) {
    if (!musicCtx) return;
    const t = musicCtx.currentTime;
    const osc = musicCtx.createOscillator();
    const gain = musicCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.12, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(musicCtx.destination);
    osc.start(t);
    osc.stop(t + duration + 0.05);
  }

  function stepMelody() {
    if (!musicPlaying) return;
    const i = musicStep % melodyNotes.length;
    playNote(melodyNotes[i], melodyDurations[i]);
    musicStep++;
    setTimeout(stepMelody, melodyDurations[i] * 1000 * 0.9);
  }

  function startMusic() {
    if (musicPlaying) return;
    try {
      if (!musicCtx) musicCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (musicCtx.state === 'suspended') musicCtx.resume();
      musicPlaying = true;
      musicStep = 0;
      stepMelody();
    } catch(e) {}
  }

  document.addEventListener('click', function startOnFirstTouch() {
    startMusic();
    document.removeEventListener('click', startOnFirstTouch);
    document.removeEventListener('touchend', startOnFirstTouch);
  });
  document.addEventListener('touchend', function startOnFirstTouch() {
    startMusic();
    document.removeEventListener('click', startOnFirstTouch);
    document.removeEventListener('touchend', startOnFirstTouch);
  });

  // ---------- Start ----------
  draw();

  // Auto-bloom first flower after a moment
  setTimeout(function() {
    const first = flowerWrappers[0];
    if (!first.classList.contains('lit')) {
      first.classList.add('lit');
      bloomCount++;
      const rect = first.getBoundingClientRect();
      spawnBurst(rect.left + rect.width / 2, rect.top, 5);
    }
  }, 2000);

  console.log('🌸 老妈，母亲节快乐！💡 点击花朵绽放 | 点击空白处放飞心愿');
})();
</script>
